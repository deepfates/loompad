<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://loompad.lol" />
        <meta property="og:title" content="loompad" />
        <meta
            property="og:description"
            content="an infinite game of choose your own adventure"
        />
        <meta
            property="og:image"
            content="https://loompad.lol/client/assets/screenshot.png"
        />

        <!-- PWA Meta Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="LoomPad" />
        <meta name="theme-color" content="#2a2a2a" />
        <meta name="msapplication-TileColor" content="#2a2a2a" />
        <link rel="apple-touch-icon" href="/client/assets/icon-192.png" />
        <link rel="manifest" href="/client/manifest.webmanifest" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:domain" content="loompad.lol" />
        <meta name="twitter:url" content="https://loompad.lol" />
        <meta name="twitter:title" content="loompad" />
        <meta
            name="twitter:description"
            content="an infinite game of choose your own adventure"
        />
        <meta
            name="twitter:image"
            content="https://loompad.lol/client/assets/screenshot.png"
        />
        <title>loompad</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
            }
        </style>
        <!--ssr-head-->
        <script>
            window.__INITIAL_STATE__ = <!--ssr-state-->;
            // Paint theme + font on <html> before React hydrates.
            // ThemeToggle owns subsequent changes — both write to <html> only.
            (function () {
                // Whitelist of theme classes that exist in terminal.css today.
                // Anything else (including legacy IDs like theme-win95,
                // theme-dark, theme-black-red) falls back to the tone default.
                var LIGHT_THEMES = {
                    "theme-light": 1,
                    "theme-blue": 1,
                    "theme-aperture": 1,
                };
                var DARK_THEMES = {
                    "theme-black-green": 1,
                    "theme-nerv": 1,
                    "theme-outrun": 1,
                };
                var DEFAULT_LIGHT = "theme-light";
                var DEFAULT_DARK = "theme-black-green";
                var pickLight = function (id) {
                    return id && LIGHT_THEMES[id] ? id : DEFAULT_LIGHT;
                };
                var pickDark = function (id) {
                    return id && DARK_THEMES[id] ? id : DEFAULT_DARK;
                };

                var prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                var themeClass = prefersDark ? DEFAULT_DARK : DEFAULT_LIGHT;
                try {
                    var raw = localStorage.getItem("loompad-theme-preferences");
                    if (raw) {
                        var prefs = JSON.parse(raw);
                        var mode = prefs && prefs.mode;
                        if (mode === "light") {
                            themeClass = pickLight(prefs.paletteLight);
                        } else if (mode === "dark") {
                            themeClass = pickDark(prefs.paletteDark);
                        } else {
                            themeClass = prefersDark
                                ? pickDark(prefs.paletteDark)
                                : pickLight(prefs.paletteLight);
                        }
                    } else {
                        var legacy = localStorage.getItem("theme");
                        if (legacy === "phosphor") themeClass = DEFAULT_DARK;
                        else if (legacy === "light") themeClass = DEFAULT_LIGHT;
                    }
                    var font = localStorage.getItem("loompad-font") || "iosevka";
                    var fontClass = font === "iosevka-slab"
                        ? "font-use-iosevka-slab"
                        : "font-use-iosevka";
                    document.documentElement.classList.add(themeClass, fontClass);
                } catch (_) {
                    document.documentElement.classList.add(
                        prefersDark ? DEFAULT_DARK : DEFAULT_LIGHT,
                        "font-use-iosevka",
                    );
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"><!--ssr-outlet--></div>
        <script type="module" src="/client/main.tsx"></script>
    </body>
</html>
